name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Remove old database files
        run: |
          rm -f test-users.db
          rm -f test-users.db-wal
          rm -f test-users.db-shm

      - name: Start local API server
        run: |
          npx tsx app/server.ts > local-api.log 2>&1 &
          echo $! > local-api.pid

      - name: Wait for local API server
        run: |
          echo "Waiting for local API server on port 3001..."

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/health > /dev/null; then
              echo "Local API server is ready."
              exit 0
            fi

            echo "Attempt ${attempt}: server is not ready yet."
            sleep 1
          done

          echo "Local API server failed to start."
          echo "Local API logs:"
          cat local-api.log || true
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --workers=1

      - name: Show local API logs on failure
        if: failure()
        run: |
          echo "========== LOCAL API LOGS =========="
          cat local-api.log || true

      - name: Stop local API server
        if: always()
        run: |
          if [ -f local-api.pid ]; then
            kill "$(cat local-api.pid)" || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload local API logs
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: local-api-logs
          path: local-api.log
          retention-days: 30